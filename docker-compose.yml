version: '3.9'

services:

  platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealer-platform
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PASS: ${REDIS_PASS}
      POSTAL_URL: ${POSTAL_URL}
      POSTAL_API_KEY: ${POSTAL_API_KEY}
      TRACKING_DOMAIN: ${TRACKING_DOMAIN}
      SUPPRESSION_SERVICE_URL: ${SUPPRESSION_SERVICE_URL}
      PLATFORM_WEBHOOK_SECRET: ${PLATFORM_WEBHOOK_SECRET}
      PLATFORM_WEBHOOK_URL: ${PLATFORM_WEBHOOK_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${GOOGLE_ADS_DEVELOPER_TOKEN}
      GOOGLE_ADS_MANAGER_ID: ${GOOGLE_ADS_MANAGER_ID}
      META_SYSTEM_TOKEN: ${META_SYSTEM_TOKEN}
      ASSET_CDN: ${ASSET_CDN}
    volumes:
      - proofs:/srv/proofs
      - logs:/srv/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dealer-net

  unsub:
    build:
      context: ./unsub-service
      dockerfile: Dockerfile
    container_name: unsub-service
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      SUPPRESSION_DB_URL: ${SUPPRESSION_DB_URL}
      SUPPRESSION_JWT_SECRET: ${SUPPRESSION_JWT_SECRET}
      PLATFORM_WEBHOOK_URL: ${PLATFORM_WEBHOOK_URL}
      PLATFORM_WEBHOOK_SECRET: ${PLATFORM_WEBHOOK_SECRET}
      OPT_OUT_DOMAIN: ${OPT_OUT_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dealer-net

  postgres:
    image: postgres:16-alpine
    container_name: dealer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: dealer_user
      POSTGRES_DB: dealer_email
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealer_user -d dealer_email"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealer-net

  redis:
    image: redis:7-alpine
    container_name: dealer-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dealer-net

volumes:
  postgres-data:
  redis-data:
  proofs:
  logs:

networks:
  dealer-net:
    driver: bridge
